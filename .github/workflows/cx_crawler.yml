name: ChaoXing Task Monitor

on:
  schedule:
    
  
  - cron: '0 * * * *'
  
  workflow_dispatch:     # 保留网页手动运行
  push:
    branches: [ master ]  # 代码推送时自动激活工作流，防止GitHub判定仓库闲置封禁

# 强制绑定仓库唯一master分支，统一shell环境，解决调度器无法定位文件问题
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: master  # 硬编码绑定你仓库唯一的master分支
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Chinese Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests

    - name: Run Script
      id: run_script
      # 移除整步全局continue-on-error，只兼容脚本内部非致命异常，修复状态判定bug
      # 补全你缺失的超星账号、密码、WxPusher推送环境变量
      env:
        CX_USERNAME: ${{ secrets.CX_USERNAME }}
        CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
      run: python main.py

    - name: Commit and push history file
      # 仅脚本运行成功时，才执行文件提交推送
      if: steps.run_script.outcome == 'success'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add history.json
        # 无文件变更时静默忽略，不报错打断工作流
        git commit -m "Update task history [skip ci]" || true
        git push

    - name: Upload screenshots artifact
      # 无论脚本成功/失败，全部上传截图备份
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analysis-screenshots
        path: screenshots.zip
        retention-days: 5

    - name: Check script run result
      # 脚本真正运行失败时，工作流标红报错，抛出异常
      if: steps.run_script.outcome == 'failure'
      run: |
        echo "Python script execution failed. Please check run logs and artifact screenshots."
        exit 1
