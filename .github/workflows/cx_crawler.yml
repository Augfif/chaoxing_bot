name: ChaoXing Task Monitor

on:
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间早上 9 点运行一次 (UTC 1点)
  workflow_dispatch:     # 允许在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    # 我们删除了手动安装 Chrome 120 的步骤
    # GitHub 的 ubuntu-latest 自带最新版 Chrome
    # 安装最新版 selenium 后，它会自动匹配并下载对应的驱动
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests
        
    - name: Run Script
      env:
        CX_USERNAME: ${{ secrets.CX_USERNAME }}
        CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
        EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
      run: python main.py
