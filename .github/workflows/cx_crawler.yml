name: ChaoXing Task Monitor

on:
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间早上 9 点运行一次 (UTC 1点)
  workflow_dispatch:     # 允许在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    # 安装Chrome和 ChromeDriver (复刻 ZDM 的稳定方案)
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v2
      with:
        chrome-version: 120
        chromedriver-version: 120
        install-chromedriver: true
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests
        
    - name: Run Script
      env:
        CX_USERNAME: ${{ secrets.CX_USERNAME }}
        CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
        EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
      run: python main.py
