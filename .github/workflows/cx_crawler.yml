name: ChaoXing Task Monitor

on:
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间早上 9 点运行一次 (UTC 1点)
  workflow_dispatch:     # 允许在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # 👈 升级到 v4
      
    - name: Set up Python
      uses: actions/setup-python@v5  # 👈 升级到 v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests

    - name: Run Script
      env:
        CX_USERNAME: ${{ secrets.CX_USERNAME }}
        CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
        EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
      run: python main.py

    - name: Upload artifact on failure
      if: failure()
      uses: actions/upload-artifact@v4   # 👈 核心修复：升级到 v4
      with:
        name: error-screenshot
        path: error_screenshot.png
