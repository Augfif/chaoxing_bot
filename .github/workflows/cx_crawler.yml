name: ChaoXing Task Monitor

on:
  schedule:
    - cron: "0 1 * * *"  # 每天北京时间早上 9 点运行一次 (UTC 1点)
  workflow_dispatch:     # 允许在网页上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Chinese Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests

    - name: Run Script
      id: run_script
      continue-on-error: true
      env:
        CX_USERNAME: ${{ secrets.CX_USERNAME }}
        CX_PASSWORD: ${{ secrets.CX_PASSWORD }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
      run: python main.py

    - name: Commit and push history file
      # 仅当脚本成功时才提交历史记录，防止因错误覆盖掉正确的历史
      if: steps.run_script.outcome == 'success'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add history.json
        # 如果文件没有变化，commit会失败，所以用 || true 来忽略错误
        git commit -m "Update task history [skip ci]" || echo "No changes to commit"
        git push

    - name: Upload screenshots artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analysis-screenshots
        path: screenshots.zip
        retention-days: 5

    - name: Check script result
      if: steps.run_script.outcome == 'failure'
      run: |
        echo "Python script failed. Check the logs and artifacts."
        exit 1